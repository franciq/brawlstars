<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Brawl Stars Live Tracker</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>Brawl Stars Live Tracker</h1>
<div id="app"></div>
<div id="details"></div>

<script src="players.js"></script>
<script>
const app = document.getElementById('app');
const detailsDiv = document.getElementById('details');

// Pokazuje listę graczy
async function showPlayers() {
  const res = await fetch('/players');
  const players = await res.json();

  app.innerHTML = '<div class="players"></div>';
  const playersDiv = document.querySelector('.players');

  players.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<img src="https://cdn.brawlify.com/profile-icons/regular/28000000.png"><p>${p.name}</p><p>🏆 ${p.trophies}</p>`;
    card.onclick = () => showDetails(p);
    playersDiv.appendChild(card);
  });
}

// Pokazuje szczegóły gracza
function showDetails(player) {
  detailsDiv.innerHTML = `
    <button onclick="showPlayers()">⬅ Powrót</button>
    <h2>${player.name}</h2>
    <p>🏆 Pucharki: ${player.trophies}</p>
    <p>🔥 Najwięcej pucharków: ${player.highestTrophies}</p>
    <p>🎮 Klub: ${player.club ? player.club.name : "Brak"}</p>
    <p>🏅 Solo wins: ${player.soloVictories}</p>
  `;
}

showPlayers();
</script>
</body>
</html>
