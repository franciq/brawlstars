<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Brawl Stars Leaderboard</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

table {
  margin: 30px auto;
  border-collapse: collapse;
  width: 90%;
  max-width: 500px;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 12px;
}

th {
  background: #0ea5e9;
}

tr:nth-child(even) {
  background: #334155;
}

tr:hover {
  background: #475569;
}

.rank {
  font-weight: bold;
}

.gold { color: gold; }
.silver { color: silver; }
.bronze { color: #cd7f32; }

.status {
  margin-top: 10px;
  font-size: 12px;
  color: #aaa;
}
</style>
</head>

<body>

<h1>🏆 Leaderboard Brawl Stars</h1>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Nick</th>
      <th>Pucharki</th>
    </tr>
  </thead>
  <tbody id="tabela"></tbody>
</table>

<div class="status" id="status">Ładowanie...</div>

<script>
// 🔥 TWOJE TAGI (możesz dodawać więcej)
const tags = [
  "%23GGVLLV9JU",
  "%232Q28JYCRPP",
  "%23CLV88VVCO",
  "%23Q8QRLU92U",
  "%23GJCQV89CJ"
];

async function loadData() {
  let players = [];

  for (let tag of tags) {
    try {
      const res = await fetch(`https://api.brawlify.com/v1/players/${tag}`);
      const data = await res.json();

      players.push({
        name: data.name,
        trophies: data.trophies
      });

    } catch {
      console.log("Błąd dla tagu:", tag);
    }
  }

  // sortowanie po pucharkach
  players.sort((a, b) => b.trophies - a.trophies);

  let html = "";

  players.forEach((p, i) => {
    let medalClass = "";
    if (i === 0) medalClass = "gold";
    else if (i === 1) medalClass = "silver";
    else if (i === 2) medalClass = "bronze";

    html += `
      <tr>
        <td class="rank ${medalClass}">${i + 1}</td>
        <td>${p.name}</td>
        <td>${p.trophies}</td>
      </tr>
    `;
  });

  document.getElementById("tabela").innerHTML = html;
  document.getElementById("status").innerText =
    "Aktualizacja: " + new Date().toLocaleTimeString();
}

// start + auto refresh
loadData();
setInterval(loadData, 30000);
</script>

</body>
</html>
