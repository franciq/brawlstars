<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Debuger API Brawl Stars</title>
    <style>
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; }
        .error { color: #f00; }
        .success { color: #0f0; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #222; padding: 5px; }
    </style>
</head>
<body>
    <h2>Diagnostyka Połączenia</h2>
    <div id="console">Inicjalizacja...</div>

    <script>
        const tags = ["RPOGGGUJJ", "P9QP9RC9Q", "GJCQV89CJ", "Q8QRLU92U", "CLV88VVCO", "Q28JYCRPP", "GGVLLV9JU"];
        const logger = document.getElementById('console');

        function log(msg, type) {
            const div = document.createElement('div');
            div.className = 'log-entry ' + type;
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logger.prepend(div);
        }

        async function testAPI() {
            logger.innerHTML = '';
            log("Rozpoczynam sprawdzanie graczy...", "success");

            for (let tag of tags) {
                const cleanTag = tag.trim().replace('#', '');
                // Kluczowe: używamy %23 zamiast #
                const url = `https://api.brawlapi.com/v1/players/%23${cleanTag}`;
                
                try {
                    log(`Sprawdzam: ${url}`, "success");
                    const res = await fetch(url);
                    
                    if (res.ok) {
                        const data = await res.json();
                        log(`SUKCES: Znaleziono gracza ${data.name} (${data.trophies}🏆)`, "success");
                    } else {
                        log(`BŁĄD ${res.status}: API nie znalazło tagu ${tag}`, "error");
                    }
                } catch (e) {
                    log(`BŁĄD SIECI: Sprawdź czy nie blokuje Cię AdBlock lub Firewall`, "error");
                }
            }
        }

        testAPI();
    </script>
</body>
</html>
