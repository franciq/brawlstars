<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Ekipy Brawl Stars</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0f0f0f; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h2 { color: #ffce4b; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; text-shadow: 2px 2px 0px rgba(0,0,0,0.5); }
        table { border-collapse: collapse; width: 100%; max-width: 900px; background: #1a1a1a; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        th { background-color: #2d2d2d; color: #ffce4b; padding: 15px; font-size: 0.85em; text-transform: uppercase; border-bottom: 2px solid #3d3d3d; }
        td { border-bottom: 1px solid #2d2d2d; padding: 12px; text-align: center; font-size: 1.05em; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #252525; transition: 0.3s; }
        .tag-label { color: #666; font-size: 0.7em; display: block; }
        .update-info { margin-top: 20px; color: #555; font-size: 0.8em; font-style: italic; }
        .trophy { color: #ffce4b; font-weight: bold; }
    </style>
</head>
<body>

    <h2>📊 Ranking Ekipy</h2>
    
    <table id="brawl-table">
        <thead>
            <tr>
                <th>Poz.</th>
                <th>Gracz</th>
                <th>Pucharki</th>
                <th>Max Pucharki</th>
                <th>Poziom</th>
            </tr>
        </thead>
        <tbody id="brawl-table-body">
            <tr><td colspan="5">Pobieranie danych ekipy...</td></tr>
        </tbody>
    </table>

    <p class="update-info" id="status">Inicjalizacja...</p>

    <script>
        // TWOJE TAGI
        const playerTags = [
            "#RPOGGGUJJ", "#P9QP9RC9Q", "#GJCQV89CJ", 
            "#Q8QRLU92U", "#CLV88VVCO", "#Q28JYCRPP", "#GGVLLV9JU"
        ]; 

        async function updateTable() {
            const tableBody = document.getElementById('brawl-table-body');
            const status = document.getElementById('status');
            let playersData = [];

            try {
                for (const tag of playerTags) {
                    // Czyścimy tag ze znaku # i spacji
                    const cleanTag = tag.trim().replace('#', '');
                    const response = await fetch(`https://api.brawlapi.com/v1/players/%23${cleanTag}`);
                    
                    if (response.ok) {
                        const data = await response.json();
                        playersData.push(data);
                    }
                }

                // Sortowanie: najwięcej pucharków na górze
                playersData.sort((a, b) => b.trophies - a.trophies);

                tableBody.innerHTML = '';
                playersData.forEach((player, index) => {
                    // Pobieramy kolor nicku (usuwamy 0x i dajemy #)
                    const nameColor = player.nameColor ? player.nameColor.replace('0x', '#') : '#ffffff';
                    
                    tableBody.innerHTML += `
                        <tr>
                            <td>${index + 1}</td>
                            <td>
                                <span style="color: ${nameColor}; font-weight: bold;">${player.name}</span>
                                <span class="tag-label">${player.tag}</span>
                            </td>
                            <td class="trophy">${player.trophies.toLocaleString()} 🏆</td>
                            <td>${player.highestTrophies.toLocaleString()}</td>
                            <td>⭐ ${player.expLevel}</td>
                        </tr>
                    `;
                });

                status.innerText = "Automatyczna aktualizacja aktywna. Ostatnia: " + new Date().toLocaleTimeString();

            } catch (err) {
                status.innerText = "Błąd połączenia. Spróbuję ponownie za chwilę...";
            }
        }

        // Start
        updateTable();

        // Odświeżanie co 30 sekund (zgodnie z Twoją prośbą)
        setInterval(updateTable, 30000);
    </script>
</body>
</html>
